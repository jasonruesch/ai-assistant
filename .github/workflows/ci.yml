name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: sourcesage
          POSTGRES_PASSWORD: sourcesage
          POSTGRES_DB: sourcesage
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sourcesage"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://sourcesage:sourcesage@localhost:5432/sourcesage?schema=public

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prepare database
        run: |
          pnpm --filter @sourcesage/api db:generate
          pnpm --filter @sourcesage/api db:deploy

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      # E2E covers the UI shell + single-origin server (no LLM key required —
      # the chat round-trip is exercised by the mocked API unit tests instead).
      - name: E2E (Playwright)
        run: |
          pnpm --filter @sourcesage/web exec playwright install --with-deps chromium
          pnpm --filter @sourcesage/web test:e2e

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
